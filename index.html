<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ملف محمي</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.box{
    background:#222;
    padding:30px;
    border-radius:15px;
    text-align:center;
}

input{
    width:250px;
    padding:10px;
    border:none;
    border-radius:20px;
    text-align:center;
}

button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:20px;
    cursor:pointer;
}

#viewer{
    display:none;
    width:100%;
    height:100vh;
    border:none;
}

#msg{
    color:red;
}
</style>
</head>

<body>

<div class="box" id="login">
    <h2>أدخل كلمة السر</h2>

    <input type="password" id="pass" placeholder="كلمة السر">
    <br><br>

    <button onclick="check()">دخول</button>

    <p id="msg"></p>
</div>

<iframe id="viewer"></iframe>

<script>
const password = "12345"; // غيّر كلمة السر هنا

function check(){
    if(document.getElementById("pass").value === password){
        document.getElementById("login").style.display="none";
        document.getElementById("viewer").style.display="block";
        document.getElementById("viewer").src="secret.pdf";
    }else{
        document.getElementById("msg").innerHTML="كلمة السر غير صحيحة";
    }
}
</script>

</body>
</html>
