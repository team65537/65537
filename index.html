<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>65537</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#050505;
color:white;
}

/* خلفية النجوم */

body::before{
content:"";
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:
radial-gradient(circle,#ffffff 1px,transparent 1px),
radial-gradient(circle,#888 1px,transparent 1px);
background-size:70px 70px,120px 120px;
opacity:.18;
animation:stars 45s linear infinite;
z-index:-2;
}

@keyframes stars{
0%{transform:translateY(0);}
100%{transform:translateY(-250px);}
}

/* طبقة ضباب */

body::after{
content:"";
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:radial-gradient(circle at center,
rgba(255,255,255,.05),
transparent 70%);
z-index:-1;
}

/* شاشة كلمة المرور */

#login{

position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);

width:340px;

padding:35px;

border-radius:20px;

background:rgba(20,20,20,.75);

backdrop-filter:blur(12px);

border:1px solid rgba(255,255,255,.1);

box-shadow:
0 0 25px rgba(255,255,255,.08),
0 0 60px rgba(0,0,0,.5);

text-align:center;

transition:.5s;

}

#login h2{

margin-bottom:20px;

font-weight:normal;

letter-spacing:2px;

}

#pass{

width:100%;

padding:15px;

border:none;

border-radius:30px;

background:#111;

color:white;

outline:none;

text-align:center;

font-size:16px;

transition:.3s;

}

#pass:focus{

box-shadow:0 0 18px rgba(255,255,255,.25);

}

#enter{

margin-top:20px;

width:100%;

padding:15px;

border:none;

border-radius:30px;

background:black;

color:white;

font-size:16px;

cursor:pointer;

transition:.3s;

}

#enter:hover{

background:white;

color:black;

transform:scale(1.04);

}

#msg{

margin-top:15px;

color:#ff6666;

min-height:20px;

}

/* اهتزاز */

.shake{

animation:shake .35s;

}

@keyframes shake{

0%,100%{transform:translate(-50%,-50%);}

20%{transform:translate(calc(-50% - 8px),-50%);}

40%{transform:translate(calc(-50% + 8px),-50%);}

60%{transform:translate(calc(-50% - 8px),-50%);}

80%{transform:translate(calc(-50% + 8px),-50%);}

}

#viewer{

display:none;

width:100vw;

height:100vh;

border:none;

background:#000;

}

#download{

display:none;

position:fixed;

right:25px;

bottom:25px;

text-decoration:none;

z-index:999;

}

#download button{

background:#000;

color:#fff;

border:2px solid #444;

padding:15px 30px;

border-radius:35px;

font-size:16px;

cursor:pointer;

transition:.3s;

box-shadow:0 0 18px rgba(255,255,255,.15);

}

#download button:hover{

background:#fff;

color:#000;

border-color:#fff;

transform:translateY(-3px) scale(1.05);

box-shadow:0 0 28px rgba(255,255,255,.35);

}

  </style></head>

<body>

<div id="login">

<h2>🔒 أدخل كلمة المرور</h2>

<input
type="password"
id="pass"
placeholder="كلمة المرور">

<button id="enter" onclick="check()">
دخول
</button>

<p id="msg"></p>

</div>

<iframe
id="viewer">
</iframe>

<a
id="download"
href="65537.pdf"
download>

<button>

⬇ تحميل PDF

</button>

</a>

<script>

const password="65537";

const pass=document.getElementById("pass");

const login=document.getElementById("login");

const viewer=document.getElementById("viewer");

const download=document.getElementById("download");

const msg=document.getElementById("msg");

pass.addEventListener("keydown",function(e){

if(e.key==="Enter"){

check();

}

});

function check(){

if(pass.value===password){

login.style.opacity="0";

setTimeout(function(){

login.style.display="none";

viewer.style.display="block";

viewer.src="65537.pdf";

download.style.display="block";

document.body.style.overflow="auto";

},400);

}else{

msg.innerHTML="❌ كلمة المرور غير صحيحة";

login.classList.add("shake");

setTimeout(function(){

login.classList.remove("shake");

},350);

}

}

/* تعطيل الزر الأيمن */

document.addEventListener("contextmenu",e=>e.preventDefault());

/* تعطيل بعض الاختصارات */

document.addEventListener("keydown",function(e){

if(
e.key==="F12"||

(e.ctrlKey&&e.shiftKey&&e.key==="I")||

(e.ctrlKey&&e.shiftKey&&e.key==="J")||

(e.ctrlKey&&e.key==="U")

){

e.preventDefault();

}

});

</script>

</body>

</html>
